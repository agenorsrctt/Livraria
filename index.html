<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 1. Sistema de Biblioteca Pessoal (O Clássico)
Ideal para treinar relacionamentos simples e organização.

O que cadastrar: Livros.

Campos: Título, Autor, Gênero, Ano de Publicação e Status (Lido/Não lido).

Desafio Extra: Adicionar uma nota de 1 a 5 para os livros já lidos.  -->
    <header>
        <h2>Minha Livraria</h2>

        <nav>
            <a href="#">Inicio</a>
            <a href="#">Livros</a>
            <a href="#">Autores</a>
        </nav>
    </header>

    <main>

        <section class="container-AddBusc">

            <form action="" class="adicionar">
                <h2>Adicionar Livro</h2>
                <hr>
                <div class="label-form-add">
                    <label for="titulo" class="label-add">Titulo: </label>
                    <input type="text" name="titulo" required>
                </div>
                <div class="label-form-add">
                    <label for="autor" class="label-add" >Autor: </label>
                    <input type="text" name="autor" required>
                </div>
                <div class="label-form-add">
                    <label for="genero" class="label-add">Gênero: </label>
                    <input type="text" name="genero" required>
                </div>
                <div class="label-form-add">
                    <label for="ano" class="label-add">Ano de Publicação: </label>
                    <input type="text" name="ano" required>
                </div>
                <button type="submit">Adicionar</button>
            </form>


            <div class="busca">
                <h2>Busca de Livros</h2>
                <hr>
                <form class="form-selecao">
                    <select name="nome" id="selecao-tipo">
                        <option value="" disabled selected>Selecione uma opção...</option>
                        <option value="titulo">Titulo</option>
                        <option value="autor">Autor</option>
                        <option value="genero">Gênero</option>
                        <option value="publicacao">Ano de Publicação</option>
                    </select>
                    <input type="text" name="texto-pesquisa" id="pesquisa">
                    <button type="submit">Pesquisar</button>
                </form>
                <div class="busca-encontrada">
                    <ul class="livros-encontrados">
                        //implementar logica no JS
                    </ul>
                </div>
            </div>
        </section>

        <section class="container-result">
            <div class="exibir-livros-cadastrados">
                <h2>Livros Cadastrados</h2>
                <ul class="livros-cadastrados"></ul>
            </div>
        </section>

    </main>

    <footer>
        <h2>Sistema de Gerenciamento de Livraria</h2>
        <p>Criado por Agenor Silva Rodrigues</p>
    </footer>

    <script src="script.js">Adicionar</script>

</body>

</html>
